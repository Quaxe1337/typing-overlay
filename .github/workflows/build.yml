name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pynput Pillow   # 👈 Added Pillow here

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller overlay.spec

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypingOverlay-Windows
          path: dist/TypingOverlay.exe
